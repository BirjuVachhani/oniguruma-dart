# Static-analysis configuration. Enables the 'recommended' lint set from
# `package:lints` (a superset of the 'core' lints pub.dev scores against),
# enforcing idiomatic, consistently-formatted Dart.
#
# See https://dart.dev/go/core-lints and https://dart.dev/tools/analysis.

include: package:lints/recommended.yaml

analyzer:
  exclude:
    # Generated: base64 of the embedded wasm module (see tool/gen_wasm_embed.dart).
    - lib/src/web/oniguruma_wasm.g.dart
