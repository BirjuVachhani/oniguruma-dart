name: oniguruma_native

description: >-
  Oniguruma regex bindings for Dart on every platform: native dart:ffi on IO,
  WebAssembly on web, behind one vscode-oniguruma-compatible OnigScanner API.

version: 1.0.1+2

repository: https://github.com/BirjuVachhani/oniguruma-dart/tree/main/packages/oniguruma_native
issue_tracker: https://github.com/BirjuVachhani/oniguruma-dart/issues

resolution: workspace

topics:
  - oniguruma
  - regex
  - regexp
  - textmate
  - syntax-highlighting

environment:
  sdk: ^3.12.0

dependencies:
  ffi: ">=2.0.0 <2.3.0"
  hooks: ">=2.0.0 <2.2.0"
  code_assets: ">=1.0.0 <1.3.0"
  native_toolchain_c: ">=0.19.0 <0.20.0"
  archive: ">=4.0.0 <4.1.0"
  crypto: ">=3.0.0 <3.1.0"

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
