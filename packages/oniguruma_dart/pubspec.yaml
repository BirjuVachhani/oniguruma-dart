name: oniguruma_dart

description: >-
  A pure-Dart port of the Oniguruma regex engine (backtracking bytecode VM).
  Full Unicode, ~28 encodings, an idiomatic String API. No FFI; verified
  against the C library.

version: 1.0.1

repository: https://github.com/BirjuVachhani/oniguruma-dart/tree/main/packages/oniguruma_dart
issue_tracker: https://github.com/BirjuVachhani/oniguruma-dart/issues

resolution: workspace

topics:
  - regex
  - regexp
  - oniguruma
  - regular-expression
  - unicode

environment:
  sdk: ^3.12.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
